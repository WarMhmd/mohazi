login:
  username:
    type: string
    required: true
    defaultError: "Invalid username."
    rules:
      min: { value: 3, error: "Username must be at least 3 characters long." }
      maxLength:
        value: 20
        error: null
  password:
    type: string
    required: true
    rules:
      minLength:
        value: 8
        error: "Password must be at least 8 characters long."
      pattern:
        value: "^(?=.*[A-Za-z])(?=.*\\d)[A-Za-z\\d]{8,}$"
        error: "Password must contain at least one letter and one number."
  id:
    type: string
    defaultError: "Invalid ID."
    rules:
      pattern:
        value: "^[0-9]{24}$"
        error: "ID must be a valid number."
    transform:
      cast: "number"
    rules1:
      min: { value: 1, error: "ID must be at least 1." }
      max: { value: 999999999999999999, error: "ID exceeds maximum allowed value." }
