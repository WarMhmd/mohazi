name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build:
    name: Build - ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: verify-linux-x64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact_name: verify-linux-arm64
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: verify-darwin-x64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: verify-darwin-arm64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: verify-win32-x64
          - os: windows-latest
            target: aarch64-pc-windows-msvc
            artifact_name: verify-win32-arm64

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (Linux ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build
        run: |
          if [ "${{ matrix.target }}" = "aarch64-unknown-linux-gnu" ]; then
            export CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc
          fi
          cargo build --release --target ${{ matrix.target }} -p mohazi_compiler
        shell: bash

      - name: Prepare Binary
        run: |
          mkdir -p dist
          if [ "${{ runner.os }}" = "Windows" ]; then
            cp target/${{ matrix.target }}/release/mohazi_compiler.exe dist/verify.exe
          else
            cp target/${{ matrix.target }}/release/mohazi_compiler dist/verify
            chmod +x dist/verify
          fi
        shell: bash

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/

  publish:
    name: Publish to NPM
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Publish Platform Packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          PLATFORMS=("linux-x64" "linux-arm64" "darwin-x64" "darwin-arm64" "win32-x64" "win32-arm64")
          
          for PLATFORM in "${PLATFORMS[@]}"; do
            echo "Publishing @uj_project/verify-$PLATFORM..."
            mkdir -p pkg-$PLATFORM/bin
            
            # Copy binary
            if [[ "$PLATFORM" == win32* ]]; then
              cp artifacts/verify-$PLATFORM/verify.exe pkg-$PLATFORM/bin/
              BIN_NAME="verify.exe"
            else
              cp artifacts/verify-$PLATFORM/verify pkg-$PLATFORM/bin/
              chmod +x pkg-$PLATFORM/bin/verify
              BIN_NAME="verify"
            fi
            
            # Generate package.json
            OS_NAME=$(echo $PLATFORM | cut -d'-' -f1)
            CPU_NAME=$(echo $PLATFORM | cut -d'-' -f2)
            
            # Map win32 to windows for package.json 'os' field if needed, 
            # but npm uses 'win32'.
            
            cat > pkg-$PLATFORM/package.json <<EOF
          {
            "name": "@uj_project/verify-$PLATFORM",
            "version": "$VERSION",
            "os": ["$OS_NAME"],
            "cpu": ["$CPU_NAME"],
            "bin": {
              "verify": "bin/$BIN_NAME"
            }
          }
          EOF
            
            cd pkg-$PLATFORM
            npm publish --access public
            cd ..
          done

      - name: Publish Main Package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          cd npm/verify
          
          # Update version and optionalDependencies
          node -e "
            const pkg = JSON.parse(require('fs').readFileSync('package.json', 'utf8'));
            pkg.version = '$VERSION';
            for (const key in pkg.optionalDependencies) {
              pkg.optionalDependencies[key] = '$VERSION';
            }
            require('fs').writeFileSync('package.json', JSON.stringify(pkg, null, 2));
          "
          
          npm publish --access public
