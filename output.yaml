login:
  username:
    type: string
    required: true
    defaultError: 'Invalid username.'
    rules:
      min_length: { value: 3, error: 'Username must be at least 3 characters long.' }
      max_length: { value: 20, error: 'Username cannot exceed 20 characters.' }
  password:
    type: string
    required: true
    defaultError: 'Invalid password.'
    rules:
      min_length: { "value": 8, "error": 'Password must be at least 8 characters long.' }
      pattern:
        value: "^(?=.*[A-Za-z])(?=.*\\d)[A-Za-z\\d]{8,}$"
        error: 'Password must contain at least one letter and one number.'
